<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Rotas - Firebase & Mapbox</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js"></script>

    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        body { 
            display: flex; 
            height: 100vh; 
            background-color: #121212; 
            color: #e0e0e0; 
            overflow: hidden; 
        }
        #sidebar { 
            width: 350px; 
            background-color: #1e1e1e; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            z-index: 1; 
            border-right: 1px solid #2d2d2d; 
        }
        h1 { 
            font-size: 20px; 
            margin-bottom: 20px; 
            color: #fff; 
            border-bottom: 2px solid #333; 
            padding-bottom: 10px; 
        }
        .section-title { 
            font-size: 14px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            color: #888; 
            margin: 15px 0 8px 0; 
        }
        #places-list { 
            list-style: none; 
            overflow-y: auto; 
            flex-grow: 1; 
        }
        .place-item { 
            background-color: #2a2a2a; 
            padding: 12px 15px; 
            border-radius: 6px; 
            margin-bottom: 10px; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            border: 1px solid transparent; 
        }
        .place-item:hover { 
            background-color: #333; 
            border-color: #0088cc; 
        }
        .place-item.active { 
            background-color: #004466; 
            border-color: #00aaee; 
            color: #ffffff; 
            }
        .place-name { 
            font-weight: bold; 
            font-size: 15px; 
            margin-bottom: 4px; 
        }
        .place-type { 
            font-size: 12px; 
            color: #aaa; 
        }
        #map-container { 
            flex-grow: 1; 
            position: relative; 
            height: 100%; 
        }
        #map { 
            width: 100%; 
            height: 100%; 
        }
        #route-info { 
            position: absolute; 
            bottom: 20px; 
            left: 20px; 
            background-color: rgba(30, 30, 30, 0.9); 
            padding: 15px; 
            border-radius: 8px; 
            display: none; 
            max-width: 300px; 
            border: 1px solid #444; 
            backdrop-filter: blur(5px); 
        }
        #route-info h3 { 
            font-size: 14px; 
            margin-bottom: 5px; 
            color: #00aaee; 
        }
        #route-details { 
            font-size: 13px; 
            color: #dddddd; 
            line-height: 1.4; 
        }
        .loading { 
            text-align: center; 
            color: #888; 
            padding: 20px; 
            font-style: italic; 
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h1>Navegador de Locais</h1>
        <div class="section-title">Selecione um Destino</div>
        <div id="loading" class="loading">Carregando dados do Firebase...</div>
        <ul id="places-list"></ul>
    </div>

    <div id="map-container">
        <div id="map"></div>
        <div id="route-info">
            <h3>Instruções de Rota</h3>
            <div id="route-details">Selecione um local para gerar a rota.</div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
